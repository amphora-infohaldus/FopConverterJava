<?xml version="1.0"?>
<fop version="1.0">
  <accessibility>true</accessibility>
  <!-- base uri linux -->
  <base>./</base>
  <source-resolution>72</source-resolution>
  <target-resolution>300</target-resolution>
  <default-page-settings height="29.7cm" width="21cm"/>
  <renderers>
    <renderer mime="application/pdf">
      <!--
        PDF/A-1b mode REMOVED. Strict archival mode requires every font
        embedded (including the base 14 PDF fonts). The akt XSL stylesheets
        use Helvetica / Times-Bold without explicit font references, so FOP
        refuses to embed them and aborts at PDF finalisation with
        SAXParseException via FOTreeBuilder.fatalError. The error is logged
        to catalina.log but does NOT propagate as a checked exception, so
        FopConverter.convertAktToPdf() returns true — and the caller gets
        a structurally broken PDF (no xref / trailer / %%EOF).

        Re-enabling PDF/A-1b requires either:
          (a) updating every akt XSL to use an embedded font, or
          (b) configuring this fop.conf with explicit <font ... embed-url="...ttf"/>
              entries for Helvetica + Times + Courier substitutes, or
          (c) patching FopConverter to attach a SAX ErrorHandler that
              catches fatalError so the converter can return false.

        For now, plain PDF is sufficient for the akt-to-PDF flow.
      -->
      <version>1.4</version>
      <fonts>
        <auto-detect/>
      </fonts>
    </renderer>
  </renderers>
</fop>
